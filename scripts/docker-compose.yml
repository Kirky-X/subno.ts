version: '3'

services:
  postgres:
    image: postgres:15-alpine
    container_name: securenotify-postgres
    environment:
      POSTGRES_USER: securenotify
      POSTGRES_PASSWORD: securenotify_password
      POSTGRES_DB: securenotify
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securenotify -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - securenotify-network

  redis:
    image: redis:7-alpine
    container_name: securenotify-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes
    networks:
      - securenotify-network

networks:
  securenotify-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
